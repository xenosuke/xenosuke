<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>notes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fff8f0;
    --fg: #1a1525;
    --surface: #ffffff;
    --border: #1a1525;
    --a1: #ff6b9d;
    --a2: #7ad3a8;
    --a3: #a47bff;
    --a4: #ff8a5b;
    --a5: #ffd166;
  }
  [data-dark="1"] {
    --bg: #1a1525;
    --fg: #fff8f0;
    --surface: #241d35;
    --border: #fff8f0;
    --a1: #ff6b9d;
    --a2: #7ad3a8;
    --a3: #a47bff;
    --a4: #ff8a5b;
    --a5: #ffd166;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg); color: var(--fg);
    font-family: 'Space Grotesk', system-ui, -apple-system, 'Hiragino Kaku Gothic ProN', sans-serif;
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
    -webkit-font-smoothing: antialiased;
  }
  ::selection { background: var(--a1); color: var(--bg); }
  a { color: inherit; }

  /* ===== NAV ===== */
  .nav {
    position: sticky; top: 0; z-index: 100;
    display: flex; justify-content: flex-end; align-items: center;
    padding: 20px 48px;
    border-bottom: 1px solid var(--border);
    background: var(--bg); backdrop-filter: blur(8px);
    transition: background 0.3s, border-color 0.3s;
  }
  .nav-logo {
    font-size: 18px; font-weight: 700; letter-spacing: -0.02em; text-decoration: none;
    color: var(--fg);
  }
  .nav-logo span { color: var(--a1); }
  .nav-right { display: flex; gap: 20px; align-items: center; }
  .nav-label {
    font-family: ui-monospace, monospace; font-size: 11px;
    letter-spacing: 0.15em; opacity: 0.5;
    border: 1px solid var(--border); padding: 3px 10px; border-radius: 999px;
  }
  .nav-dark {
    width: 32px; height: 32px; border-radius: 50%;
    border: 1px solid var(--border); background: transparent;
    cursor: pointer; font-size: 14px; color: var(--fg);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .nav-dark:hover { background: var(--fg); color: var(--bg); }

  /* ===== HERO ===== */
  .hero {
    padding: 48px 48px 32px;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: flex-end; gap: 24px;
    position: relative; overflow: hidden;
  }
  .hero-shapes {
    position: absolute; right: 0; top: 0; bottom: 0; width: 240px;
    pointer-events: none;
  }
  .hero-circle {
    position: absolute; right: 48px; top: 24px;
    width: 80px; height: 80px; border-radius: 50%;
    background: var(--a2); opacity: 0.85;
  }
  .hero-rect {
    position: absolute; right: 140px; bottom: 16px;
    width: 40px; height: 40px; border-radius: 8px;
    background: var(--a3); transform: rotate(15deg); opacity: 0.85;
  }
  .hero-tri {
    position: absolute; right: 28px; bottom: 20px;
    width: 36px; height: 36px;
    background: var(--a4);
    clip-path: polygon(50% 0, 100% 100%, 0 100%);
    opacity: 0.85;
  }
  .hero-title {
    font-size: clamp(32px, 6vw, 64px); font-weight: 700;
    letter-spacing: -0.03em; line-height: 1; color: var(--fg);
  }
  .hero-title em {
    background: var(--a1); color: var(--bg);
    font-style: normal; padding: 0 0.12em; display: inline-block;
    transform: rotate(-1.5deg);
  }
  .hero-meta {
    font-family: ui-monospace, monospace; font-size: 11px;
    opacity: 0.5; letter-spacing: 0.1em; line-height: 1.8; text-align: right; flex-shrink: 0;
  }

  /* ===== SEARCH ===== */
  .search-bar {
    padding: 24px 48px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px;
  }
  .search-wrap { position: relative; flex: 1; max-width: 480px; }
  .search-input {
    width: 100%; padding: 10px 40px 10px 16px;
    border: 1px solid var(--border); border-radius: 999px;
    background: var(--surface); color: var(--fg);
    font-family: inherit; font-size: 14px; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-input:focus {
    border-color: var(--a1);
    box-shadow: 0 0 0 3px rgba(255,107,157,0.15);
  }
  .search-input::placeholder { color: var(--fg); opacity: 0.4; }
  .search-icon { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); font-size: 15px; opacity: 0.4; pointer-events: none; }
  .search-count { font-family: ui-monospace, monospace; font-size: 12px; opacity: 0.5; }

  /* ===== SHELVES ===== */
  .shelves { padding: 32px 48px 80px; }

  /* ===== BIG CATEGORY ===== */
  .big-cat { margin-bottom: 24px; }
  .big-cat-header {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 24px;
    background: var(--fg); color: var(--bg);
    border-radius: 14px;
    margin-bottom: 8px;
    user-select: none;
  }
  .big-cat-icon {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--bg); opacity: 0.15; flex-shrink: 0;
  }
  .big-cat-label {
    font-size: 11px; font-family: ui-monospace, monospace;
    letter-spacing: 0.18em; text-transform: uppercase;
    opacity: 0.55; flex-shrink: 0;
  }
  .big-cat-name {
    font-size: 18px; font-weight: 700; letter-spacing: -0.02em; flex: 1;
    color: var(--bg);
  }
  .big-cat-badge {
    font-family: ui-monospace, monospace; font-size: 11px;
    border: 1px solid rgba(255,255,255,0.3); padding: 2px 10px; border-radius: 999px;
    color: var(--bg); opacity: 0.7;
  }

  .big-cat-shelves { display: flex; flex-direction: column; gap: 6px; padding-left: 16px; }

  /* ===== SHELF ===== */
  .shelf { margin-bottom: 0; }

  .shelf-header {
    display: flex; align-items: center; gap: 16px;
    padding: 12px 20px;
    border: 1px solid var(--border); border-radius: 12px;
    cursor: pointer; user-select: none;
    background: var(--surface);
    transition: background 0.15s, box-shadow 0.2s;
  }
  .shelf-header:hover { box-shadow: 4px 4px 0 var(--fg); }
  .shelf-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .shelf-name { font-size: 16px; font-weight: 600; flex: 1; letter-spacing: -0.01em; }
  .shelf-badge {
    font-family: ui-monospace, monospace; font-size: 11px; opacity: 0.6;
    border: 1px solid var(--border); padding: 2px 10px; border-radius: 999px;
  }
  .shelf-arrow { font-size: 11px; opacity: 0.5; transition: transform 0.25s; }
  .shelf-arrow.open { transform: rotate(90deg); }

  .shelf-body { overflow: hidden; transition: max-height 0.35s ease; }
  .shelf-entries {
    display: flex; flex-direction: column; gap: 2px;
    padding: 6px 0 8px 20px;
  }
  .entry {
    display: flex; align-items: baseline; gap: 12px;
    padding: 8px 20px;
    border-radius: 8px;
    transition: background 0.15s;
  }
  .entry:hover { background: var(--surface); }
  .entry-num { font-family: ui-monospace, monospace; font-size: 10px; opacity: 0.4; flex-shrink: 0; width: 28px; }
  .entry-link {
    font-size: 14px; line-height: 1.5; text-decoration: none; color: var(--fg);
    border-bottom: 1px solid transparent; transition: border-color 0.2s, color 0.2s;
  }
  .entry-link:hover { border-bottom-color: currentColor; }

  /* ===== FOOTER ===== */
  .footer {
    padding: 24px 48px; border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    font-family: ui-monospace, monospace; font-size: 11px; opacity: 0.5;
  }
  .footer a { color: inherit; text-decoration: none; border-bottom: 1px solid currentColor; }

  mark { background: var(--a5); color: var(--fg); border-radius: 2px; padding: 0 1px; }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-right">
    <span class="nav-label">PRIVATE</span>
    <button class="nav-dark" id="dark-btn" aria-label="ダークモード切替">☀</button>
  </div>
</nav>

<div class="hero">
  <div class="hero-shapes">
    <div class="hero-circle"></div>
    <div class="hero-rect"></div>
    <div class="hero-tri"></div>
  </div>
  <div>
    <div class="hero-title">
      suke's <em>notes</em>
    </div>
    <div style="margin-top:12px;font-size:14px;opacity:0.6;font-family:ui-monospace,monospace;letter-spacing:0.05em">
      Qiita 非公開記事リンク集
    </div>
  </div>
  <div class="hero-meta" id="hero-meta">— articles</div>
</div>

<div class="search-bar">
  <div class="search-wrap">
    <input type="text" class="search-input" id="search-input" placeholder="記事を絞り込む…">
    <span class="search-icon">⌕</span>
  </div>
  <span class="search-count" id="search-count"></span>
</div>

<div class="shelves" id="shelves"></div>

<footer class="footer">
  <span>noindex · このページは非公開です</span>
  <a href="./index.html">← portfolio へ戻る</a>
</footer>

<script>
// 大カテゴリ → サブカテゴリ → 記事 の階層構造
const BIG_CATEGORIES = [
  {
    id: "engine",
    name: "エンジン",
    label: "ENGINE",
    accent: "var(--a5)",
    subs: [
      {
        id: "unity", name: "Unity", accent: "var(--a5)",
        articles: [
          { title: "SpriteAtlasの基本的な使い方", url: "https://qiita.com/xenosuke/private/8e136ed58f63a00f4613" },
          { title: "SpriteAtlasのPacking設定について", url: "https://qiita.com/xenosuke/private/22af7b06f0b10deac90b" },
          { title: "Texture2D Import Settingsについて", url: "https://qiita.com/xenosuke/private/0a1ef7aa4a1a36c5d461" },
          { title: "ML-Agents を使って敵 AI に強化学習させてみた", url: "#" },
          { title: "ジェスチャー入力の認識アルゴリズムを C# で自作する", url: "#" },
        ],
      },
    ],
  },
  {
    id: "library",
    name: "ライブラリ",
    label: "LIBRARY",
    accent: "var(--a1)",
    subs: [
      {
        id: "directx", name: "DirectX", accent: "var(--a1)",
        articles: [
          { title: "DirectX 12 初期化のボイラープレートを最小構成で書く", url: "#" },
          { title: "SwapChain と RenderTarget の仕組みをちゃんと理解する", url: "#" },
          { title: "頂点バッファ・インデックスバッファの作り方", url: "#" },
          { title: "HLSL でピクセルシェーダーを書いて色を変える", url: "#" },
          { title: "コンスタントバッファで行列を GPU に渡す仕組み", url: "#" },
        ],
      },
      {
        id: "directxtk", name: "DirectXTK", accent: "var(--a4)",
        articles: [
          { title: "DirectXTK の SpriteBatch で 2D 描画を爆速実装", url: "#" },
          { title: "DirectXTK12 の SimpleMath を使ったベクトル/行列演算", url: "#" },
        ],
      },
      {
        id: "dxlib", name: "DXライブラリ", accent: "var(--a2)",
        articles: [
          { title: "DXライブラリ環境構築 (Visual Studio 2022)", url: "#" },
          { title: "DrawGraph / LoadGraph で画像を表示する基本", url: "#" },
          { title: "SetDrawScreen でレンダリングターゲットを切り替える", url: "#" },
          { title: "DXライブラリで当たり判定を自作する", url: "#" },
          { title: "サウンド再生 (PlaySoundMem) の注意点まとめ", url: "#" },
          { title: "ゲームステートマネージャを DXライブラリで作る", url: "#" },
        ],
      },
    ],
  },
  {
    id: "lang",
    name: "言語",
    label: "LANGUAGE",
    accent: "var(--a3)",
    subs: [
      {
        id: "csharp", name: "C#", accent: "var(--a3)",
        articles: [
          { title: "C# の async/await を基礎から理解する", url: "#" },
          { title: "LINQ を使ったコレクション操作パターン集", url: "#" },
          { title: "ジェネリクスで型安全な汎用クラスを作る", url: "#" },
        ],
      },
      {
        id: "cpp", name: "C++", accent: "var(--a3)",
        articles: [
          { title: "C++ でのメモリ管理入門：スタックとヒープを理解する", url: "#" },
          { title: "スマートポインタ (unique_ptr / shared_ptr) 実践ガイド", url: "#" },
          { title: "テンプレートメタプログラミングで型安全なコンポーネントを作る", url: "#" },
          { title: "C++17 の構造化束縛でコードをスッキリさせる", url: "#" },
          { title: "constexpr を使った定数式の最適化テクニック", url: "#" },
          { title: "ムーブセマンティクスを完全理解する", url: "#" },
        ],
      },
    ],
  },
];

const TOTAL = BIG_CATEGORIES.reduce((s, bc) => s + bc.subs.reduce((s2, c) => s2 + c.articles.length, 0), 0);

let dark = localStorage.getItem("notes-dark") === "1";
let query = "";

// 開閉状態：大カテゴリは初期すべて開く、サブは最初の1つだけ開く
let bigOpenState = Object.fromEntries(BIG_CATEGORIES.map(bc => [bc.id, true]));
let openState = {};
BIG_CATEGORIES.forEach((bc, bi) => {
  bc.subs.forEach((c, ci) => { openState[c.id] = ci === 0; });
});

function hl(text, q) {
  if (!q) return text;
  const i = text.toLowerCase().indexOf(q.toLowerCase());
  if (i === -1) return text;
  return text.slice(0, i) + "<mark>" + text.slice(i, i + q.length) + "</mark>" + text.slice(i + q.length);
}

function applyDark() {
  document.documentElement.setAttribute("data-dark", dark ? "1" : "0");
  document.getElementById("dark-btn").textContent = dark ? "☾" : "☀";
  localStorage.setItem("notes-dark", dark ? "1" : "0");
}

function render() {
  applyDark();
  document.getElementById("hero-meta").textContent = TOTAL + " articles · 2026.05";

  const shelves = document.getElementById("shelves");
  shelves.innerHTML = "";
  let matchTotal = 0;

  BIG_CATEGORIES.forEach(bc => {
    // 大カテゴリ内にヒットが1件でもあるか確認
    const hasHit = bc.subs.some(c =>
      !query || c.articles.some(a => a.title.toLowerCase().includes(query.toLowerCase()))
    );
    if (query && !hasHit) return;

    const bigTotal = bc.subs.reduce((s, c) => s + c.articles.length, 0);
    const bigFiltered = bc.subs.reduce((s, c) => s + (query
      ? c.articles.filter(a => a.title.toLowerCase().includes(query.toLowerCase())).length
      : c.articles.length), 0);

    const bigDiv = document.createElement("div");
    bigDiv.className = "big-cat";

    // 大カテゴリヘッダー
    const bigHeader = document.createElement("div");
    bigHeader.className = "big-cat-header";
    bigHeader.style.background = bc.accent.replace("var(--a", "").replace(")", ""); // fallback
    bigHeader.style.background = `var(--fg)`;
    bigHeader.innerHTML = `
      <span class="big-cat-label">${bc.label}</span>
      <span class="big-cat-name">${bc.name}</span>
      <span class="big-cat-badge">${query ? bigFiltered + " / " + bigTotal : bigTotal} 件</span>
    `;
    bigHeader.style.cursor = "pointer";
    bigHeader.addEventListener("click", () => {
      bigOpenState[bc.id] = !bigOpenState[bc.id];
      render();
    });
    bigDiv.appendChild(bigHeader);

    // サブカテゴリ群
    const subsWrap = document.createElement("div");
    subsWrap.className = "big-cat-shelves";
    subsWrap.style.display = bigOpenState[bc.id] ? "flex" : "none";

    bc.subs.forEach(cat => {
      const filtered = query
        ? cat.articles.filter(a => a.title.toLowerCase().includes(query.toLowerCase()))
        : cat.articles;
      if (query && filtered.length === 0) return;
      matchTotal += filtered.length;

      const isOpen = query ? true : openState[cat.id];
      const badge = query ? `${filtered.length} / ${cat.articles.length} 件` : `${cat.articles.length} 件`;
      const itemH = 38;
      const bodyH = filtered.length * itemH + 20;

      const shelf = document.createElement("div");
      shelf.className = "shelf";
      shelf.innerHTML = `
        <div class="shelf-header" data-id="${cat.id}">
          <div class="shelf-dot" style="background:${cat.accent}"></div>
          <span class="shelf-name">${cat.name}</span>
          <span class="shelf-badge">${badge}</span>
          <span class="shelf-arrow ${isOpen ? "open" : ""}">▶</span>
        </div>
        <div class="shelf-body" style="max-height:${isOpen ? bodyH : 0}px">
          <div class="shelf-entries">
            ${filtered.map((a, ai) => `
              <div class="entry">
                <span class="entry-num">${String(ai + 1).padStart(3, "0")}</span>
                <a href="${a.url}" class="entry-link" target="_blank" rel="noopener">${hl(a.title, query)}</a>
              </div>`).join("")}
          </div>
        </div>`;

      shelf.querySelector(".shelf-header").addEventListener("click", () => {
        openState[cat.id] = !openState[cat.id];
        render();
      });
      subsWrap.appendChild(shelf);
    });

    bigDiv.appendChild(subsWrap);
    shelves.appendChild(bigDiv);
  });

  const countEl = document.getElementById("search-count");
  countEl.textContent = query ? `${matchTotal} 件ヒット` : "";
}

// Events
document.getElementById("dark-btn").addEventListener("click", () => { dark = !dark; render(); });
document.getElementById("search-input").addEventListener("input", e => { query = e.target.value; render(); });

render();
</script>
</body>
</html>
